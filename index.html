<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borç Analiz OS v3.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'JetBrains Mono', monospace; background-color: #050505; color: #00ffaa; }
        .terminal-border { border: 1px solid #004422; background: rgba(0, 15, 5, 0.9); }
        .neon-text { text-shadow: 0 0 8px rgba(0, 255, 170, 0.6); }
    </style>
</head>
<body class="p-4 md:p-8">

    <script>
        // --- BU SATIRI KENDİ LİNKİNLE DEĞİŞTİR (TIRNAKLARA DİKKAT) ---
        const API_URL = 'https://script.google.com/macros/s/AKfycby_fvtRhd2OwSAX5b51fxe7fBxWelWg5eWdBDW0iCJMfOr4mSLv8Gv9pvrz37XGfFurtg/exec';
        // ----------------------------------------------------------

        async function init() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                if (data.error) throw new Error(data.error);
                renderUI(data);
            } catch (e) {
                document.getElementById('loading').innerHTML = "KRİTİK HATA: " + e.message;
            }
        }
    </script>

    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-green-900 pb-4">
            <div>
                <h1 class="text-2xl font-bold neon-text uppercase tracking-tighter">>> STRATEGY_ENGINE_V3.2</h1>
                <p id="last-update" class="text-[10px] opacity-50 font-bold italic font-mono uppercase">System_Active</p>
            </div>
        </header>

        <div id="loading" class="text-center py-20 animate-pulse text-xl font-mono">VERİLER SENKRONİZE EDİLİYOR...</div>

        <div id="main-ui" class="hidden">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8" id="top-stats"></div>
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                <div class="lg:col-span-3 terminal-border p-5 rounded-lg overflow-hidden">
                    <h2 class="text-xs font-bold mb-4 text-green-500 uppercase">// NAKİT_AKIŞI_TABLOSU</h2>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-[11px]">
                            <thead>
                                <tr class="border-b border-green-800 text-green-700 uppercase font-bold">
                                    <th class="p-2">Sorumlu</th>
                                    <th class="p-2">Kurum / Tür</th>
                                    <th class="p-2 text-right">Kalan Bakiye</th>
                                    <th class="p-2 text-center">Faiz</th>
                                    <th class="p-2 text-right text-cyan-400">Aylık Ödeme</th>
                                    <th class="p-2 text-center">Vade</th>
                                </tr>
                            </thead>
                            <tbody id="data-rows"></tbody>
                        </table>
                    </div>
                </div>
                <div class="space-y-6">
                    <div class="terminal-border p-5 rounded-lg text-[10px] space-y-3" id="strategy-box"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function renderUI(data) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('main-ui').classList.remove('hidden');
            let totalDebt = 0, totalMonthly = 0, dailyLoss = 0;
            let rowsHtml = '';

            data.forEach(item => {
                const getVal = (key) => item[key] || item[key.trim()] || 0;
                const kime = item['Kime'] || '---';
                const banka = item['Banka'] || '---';
                const tur = item['Tür'] || '---';
                const kalan = parseFloat(getVal('Kalan Borç')) || 0;
                const faiz = parseFloat(getVal('Faiz Oranı')) || 0;
                let aylik = parseFloat(getVal('Aylık Ödeme')) || 0;
                if (aylik === 0 && (tur === 'KMH' || tur === 'Kredi Kartı')) {
                    aylik = (kalan * (faiz / 100));
                }
                totalDebt += kalan;
                totalMonthly += aylik;
                if(tur === 'KMH') dailyLoss += (kalan * (faiz/100)) / 30;

                rowsHtml += `
                    <tr class="border-b border-green-950 hover:bg-green-900/10 transition-colors font-mono">
                        <td class="p-3 font-bold text-white">${kime}</td>
                        <td class="p-3 opacity-70">${banka} <span class="text-[9px] text-green-700">[${tur}]</span></td>
                        <td class="p-3 text-right text-white font-bold">₺${kalan.toLocaleString('tr-TR')}</td>
                        <td class="p-3 text-center ${faiz >= 4 ? 'text-red-500' : 'text-yellow-600'}">%${faiz}</td>
                        <td class="p-3 text-right text-cyan-400 font-bold">₺${aylik.toLocaleString('tr-TR', {maximumFractionDigits:0})}</td>
                        <td class="p-3 text-center opacity-50 text-[10px]">${getVal('Ödenen Taksit')}/${getVal('Toplam Taksit')}</td>
                    </tr>
                `;
            });

            document.getElementById('data-rows').innerHTML = rowsHtml;
            document.getElementById('last-update').innerText = "SYNC_OK: " + new Date().toLocaleTimeString();
            document.getElementById('top-stats').innerHTML = `
                <div class="terminal-border p-4 bg-black"><p class="text-[9px] opacity-50 uppercase">Toplam Borç</p><p class="text-xl font-bold">₺${totalDebt.toLocaleString('tr-TR')}</p></div>
                <div class="terminal-border p-4 border-l-4 border-cyan-500 bg-cyan-950/10"><p class="text-[9px] uppercase text-cyan-500 font-bold">Aylık Nakit Çıkışı</p><p class="text-xl font-bold text-cyan-400">₺${totalMonthly.toLocaleString('tr-TR')}</p></div>
                <div class="terminal-border p-4 border-l-4 border-red-500 bg-red-950/10"><p class="text-[9px] uppercase text-red-500 font-bold">Günlük Faiz Sızıntısı</p><p class="text-xl font-bold text-red-500">₺${dailyLoss.toFixed(2)}</p></div>
                <div class="terminal-border p-4"><p class="text-[9px] opacity-50 uppercase">Dosya Sayısı</p><p class="text-xl font-bold">${data.length}</p></div>
            `;
            document.getElementById('strategy-box').innerHTML = `
                <h2 class="text-xs font-bold mb-4 text-yellow-600 uppercase">// SİSTEM_MESAJI</h2>
                <p>● <b class="text-white">UYARI:</b> Günlük faiz sızıntısı <span class="text-red-500 font-bold">₺${dailyLoss.toFixed(2)}</span>.</p>
            `;
        }
        init();
    </script>
</body>
</html>
